id: business.funnel_flow_3d
version: 1.0.0
category: business
title: Funnel Flow 3D
description: Tracks prospects through funnel stages, conversion leaks, owners, and recovery actions.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: funnel
  group_by: group
effects:
  engine: three.v1
  scene: business_funnel_flow_3d
  camera: orbit_isometric
  particles: event_stream
  material: dashboard_glass
  motion: flow_chase
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
    - step_scrub
  postprocess:
    - emissive_glow
    - depth_fog
    - soft_reflection
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/business.funnel_flow_3d/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/business.funnel_flow_3d/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - 3d
  - business
  - flow
  - funnel
  - graph
