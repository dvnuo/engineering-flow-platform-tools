id: knowledge.spec_compliance_map
version: 1.0.0
category: knowledge
title: Spec Compliance Map
description: Connects spec requirements, implementation evidence, tests, exceptions, and compliance gaps.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: matrix_board
  group_by: group
effects:
  engine: three.v1
  scene: knowledge_spec_compliance_map
  camera: isometric_dashboard
  particles: evidence_beams
  material: emissive_network
  motion: metric_lift
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
    - metric_depth_hover
  postprocess:
    - emissive_glow
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/knowledge.spec_compliance_map/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/knowledge.spec_compliance_map/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - compliance
  - graph
  - knowledge
  - map
  - matrix_board
  - spec
