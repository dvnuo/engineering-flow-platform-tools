id: project.cross_doc_citation_graph
version: 1.0.0
category: project
title: Cross Doc Citation Graph
description: Connects documents, cited decisions, source claims, and conflicting references across a project.
input_schema: schema.input.json
input_schema_kind: evidence_v1
renderer:
  contract: offline.evidence.v1
layout:
  preset: citation_map
  group_by: group
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/project.cross_doc_citation_graph/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/project.cross_doc_citation_graph/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - citation
  - citation_map
  - cross
  - doc
  - evidence
  - graph
  - project
