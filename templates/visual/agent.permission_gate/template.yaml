id: agent.permission_gate
version: 1.0.0
title: Agent Permission Gate
description: Visualize allow, ask, and deny decisions around guarded commands.
input_schema: schema.input.json
input_schema_kind: graph_events_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: layered_stack
  group_by: gate
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/template/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/template/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - inspect
  - filter
  - search
  - replay
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
