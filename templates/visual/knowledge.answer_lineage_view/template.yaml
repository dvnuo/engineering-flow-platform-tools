id: knowledge.answer_lineage_view
version: 1.0.0
category: knowledge
title: Answer Lineage View
description: Visualize Answer Lineage View as a complete offline evidence view for knowledge workflows using the radial_tree layout.
input_schema: schema.input.json
input_schema_kind: evidence_v1
renderer:
  contract: offline.evidence.v1
layout:
  preset: radial_tree
  group_by: group
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/knowledge.answer_lineage_view/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/knowledge.answer_lineage_view/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - answer
  - evidence
  - knowledge
  - lineage
  - radial_tree
  - view
