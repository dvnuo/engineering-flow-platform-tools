id: runtime.health_radar
version: 1.0.0
category: runtime
title: Health Radar
description: Plots services by saturation, errors, latency, dependency health, and incident exposure.
input_schema: schema.input.json
input_schema_kind: matrix_v1
renderer:
  contract: offline.matrix.v1
layout:
  preset: radar_sphere
  group_by: group
effects:
  engine: three.v1
  scene: runtime_health_radar
  camera: isometric_dashboard
  particles: event_stream
  material: holographic_rings
  motion: timeline_replay
  interaction:
    - orbit_drag
    - raycast_inspect
    - replay_timeline
    - metric_depth_hover
  postprocess:
    - emissive_glow
    - depth_fog
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/runtime.health_radar/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/runtime.health_radar/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - health
  - matrix
  - radar
  - radar_sphere
  - runtime
