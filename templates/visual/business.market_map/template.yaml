id: business.market_map
version: 1.0.0
category: business
title: Market Map
description: Places market segments by size, growth, competition, fit, and entry confidence.
input_schema: schema.input.json
input_schema_kind: matrix_v1
renderer:
  contract: offline.matrix.v1
layout:
  preset: terrain_heatmap
  group_by: group
effects:
  engine: three.v1
  scene: business_market_map
  camera: isometric_dashboard
  particles: kpi_signal_dust
  material: heightfield_surface
  motion: flow_chase
  interaction:
    - orbit_drag
    - raycast_inspect
    - metric_depth_hover
  postprocess:
    - emissive_glow
    - depth_fog
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/business.market_map/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/business.market_map/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - business
  - map
  - market
  - matrix
  - terrain_heatmap
