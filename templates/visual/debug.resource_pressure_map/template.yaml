id: debug.resource_pressure_map
version: 1.0.0
category: debug
title: Resource Pressure Map
description: Plots CPU, memory, disk, connection, and queue pressure by component and severity.
input_schema: schema.input.json
input_schema_kind: matrix_v1
renderer:
  contract: offline.matrix.v1
layout:
  preset: radar_sphere
  group_by: group
effects:
  engine: three.v1
  scene: debug_resource_pressure_map
  camera: isometric_dashboard
  particles: evidence_beams
  material: holographic_rings
  motion: orbital_scan
  interaction:
    - orbit_drag
    - raycast_inspect
    - metric_depth_hover
    - filter_relation
  postprocess:
    - emissive_glow
    - status_glitch
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/debug.resource_pressure_map/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/debug.resource_pressure_map/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - debug
  - map
  - matrix
  - pressure
  - radar_sphere
  - resource
