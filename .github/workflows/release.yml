name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ''
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: '.exe'
            archive: zip
          - goos: windows
            goarch: arm64
            ext: '.exe'
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod download
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p "dist/${{ matrix.goos }}-${{ matrix.goarch }}"
          ldflags="-X engineering-flow-platform-tools/internal/version.Version=${version} -X engineering-flow-platform-tools/internal/version.Commit=${GITHUB_SHA} -X engineering-flow-platform-tools/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/jira${{ matrix.ext }}" ./cmd/jira
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/confluence${{ matrix.ext }}" ./cmd/confluence
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/jenkins${{ matrix.ext }}" ./cmd/jenkins
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/aws-auth${{ matrix.ext }}" ./cmd/aws-auth
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/browser${{ matrix.ext }}" ./cmd/browser
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/mobile${{ matrix.ext }}" ./cmd/mobile
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/inspect-image${{ matrix.ext }}" ./cmd/inspect-image
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "$ldflags" -o "dist/${{ matrix.goos }}-${{ matrix.goarch }}/visual${{ matrix.ext }}" ./cmd/visual
          cp README.md docs/*.md "dist/${{ matrix.goos }}-${{ matrix.goarch }}/"
          mkdir -p "dist/${{ matrix.goos }}-${{ matrix.goarch }}/templates"
          cp -R templates/visual "dist/${{ matrix.goos }}-${{ matrix.goarch }}/templates/"
          name="engineering-flow-platform-tools_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "dist/${{ matrix.goos }}-${{ matrix.goarch }}" && zip -r "../${name}.zip" .)
          else
            tar -C "dist/${{ matrix.goos }}-${{ matrix.goarch }}" -czf "dist/${name}.tar.gz" .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: engineering-flow-platform-tools-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/engineering-flow-platform-tools_*
