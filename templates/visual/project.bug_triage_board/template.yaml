id: project.bug_triage_board
version: 1.0.0
category: project
title: Bug Triage Board
description: Organizes bugs by severity, owner, reproduction status, customer impact, and next action.
input_schema: schema.input.json
input_schema_kind: matrix_v1
renderer:
  contract: offline.matrix.v1
layout:
  preset: kanban
  group_by: group
effects:
  engine: three.v1
  scene: project_bug_triage_board
  camera: isometric_dashboard
  particles: risk_heat_points
  material: matte_depth
  motion: metric_lift
  interaction:
    - orbit_drag
    - raycast_inspect
    - metric_depth_hover
  postprocess:
    - depth_fog
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/project.bug_triage_board/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/project.bug_triage_board/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - board
  - bug
  - kanban
  - matrix
  - project
  - triage
