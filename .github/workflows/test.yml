name: test

on:
  push:
  pull_request:

jobs:
  go:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/jira
      - run: go build ./cmd/confluence
      - run: go build ./cmd/jenkins
      - run: go build ./cmd/aws-auth
      - run: go build ./cmd/browser
      - run: go build ./cmd/mobile
      - run: go build ./cmd/inspect-image
      - run: go build ./cmd/visual
      - name: smoke unix
        if: runner.os != 'Windows'
        run: bash scripts/smoke.sh
      - name: smoke windows
        if: runner.os == 'Windows'
        shell: cmd
        run: scripts\smoke.bat
