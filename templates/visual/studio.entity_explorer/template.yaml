id: studio.entity_explorer
version: 1.0.0
category: studio
title: Entity Explorer Studio
description: Builds an explorable entity page with hero objects, inspector panels, relationships, metrics, and evidence.
input_schema: schema.input.json
input_schema_kind: studio_v1
renderer:
  contract: offline.studio.v1
layout:
  preset: studio_entity_explorer
  group_by: kind
effects:
  engine: three.v1
  scene: studio_entity_explorer
  camera: orbit_isometric
  particles: semantic_depth_dust
  material: holographic
  motion: slow_orbit
  interaction:
    - click_inspect
    - search
    - filter_panels
  postprocess:
    - emissive_glow
visual_design:
  initial_view: overview
  max_initial_nodes: 52
  max_initial_edges: 104
  default_collapse_depth: 1
  group_by:
    - kind
    - owner
    - provider
    - status
  supports:
    - studio_panels
    - hero_visual
    - navigation
    - inspector
    - controls
    - assumptions
    - annotations
  agent_guidance:
    - Use this template when the user wants to explore services, components, entities, or capabilities.
    - Keep hero.data focused on important entities and their meaningful relationships.
    - Put metrics, ownership, evidence, and open questions in panels.
    - Add controls for search, kind filtering, and relationship focus.
    - Read panel-grammar before writing panels.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/studio.entity_explorer/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/studio.entity_explorer/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - panel_navigation
  - search
  - filter_by_type
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - studio
  - entity
  - explorer
  - inspector
  - page
