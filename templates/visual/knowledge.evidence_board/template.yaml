id: knowledge.evidence_board
version: 1.0.0
category: knowledge
title: Evidence Board
description: Boards claims, sources, reliability, confidence, and support or refute links for a decision.
input_schema: schema.input.json
input_schema_kind: evidence_v1
renderer:
  contract: offline.evidence.v1
layout:
  preset: evidence_board
  group_by: group
effects:
  engine: three.v1
  scene: knowledge_evidence_board
  camera: isometric_dashboard
  particles: evidence_beams
  material: glass_panels
  motion: beam_trace
  interaction:
    - orbit_drag
    - raycast_inspect
    - filter_relation
  postprocess:
    - soft_reflection
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/knowledge.evidence_board/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/knowledge.evidence_board/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - board
  - evidence
  - evidence_board
  - knowledge
