id: studio.sequence_walkthrough
version: 1.0.0
category: studio
title: Sequence Walkthrough Studio
description: Turns participants, messages, events, and phases into a guided walkthrough page with panels.
input_schema: schema.input.json
input_schema_kind: studio_v1
renderer:
  contract: offline.studio.v1
layout:
  preset: studio_sequence_walkthrough
  group_by: phase
effects:
  engine: three.v1
  scene: studio_sequence_walkthrough
  camera: orbit_isometric
  particles: semantic_depth_dust
  material: holographic
  motion: slow_orbit
  interaction:
    - click_inspect
    - narrative_step
    - phase_focus
  postprocess:
    - emissive_glow
visual_design:
  initial_view: overview
  max_initial_nodes: 44
  max_initial_edges: 120
  default_collapse_depth: 0
  group_by:
    - phase
    - participant
    - status
    - kind
  supports:
    - studio_panels
    - hero_visual
    - navigation
    - inspector
    - controls
    - assumptions
    - annotations
  agent_guidance:
    - Use this template when a sequence needs a guided explanation with panels.
    - Keep hero.data participants and messages focused on the user-visible walkthrough.
    - Put protocol details, alternatives, and evidence in panels.
    - Add controls for phase stepping, participant focus, and failure branch inspection.
    - Read panel-grammar before writing panels.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/studio.sequence_walkthrough/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/studio.sequence_walkthrough/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - panel_navigation
  - phase_step
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - studio
  - sequence
  - walkthrough
  - explain
  - page
