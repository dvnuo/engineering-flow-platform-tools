id: codebase.refactor_plan_map
version: 1.0.0
category: codebase
title: Refactor Plan Map
description: Lays out refactor targets, dependencies, staging strategy, and validation gates.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: diff_split_view
  group_by: group
effects:
  engine: three.v1
  scene: codebase_refactor_plan_map
  camera: orbit_isometric
  particles: dependency_pulses
  material: emissive_network
  motion: slow_orbit
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
  postprocess:
    - emissive_glow
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/codebase.refactor_plan_map/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/codebase.refactor_plan_map/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - codebase
  - diff_split_view
  - graph
  - map
  - plan
  - refactor
