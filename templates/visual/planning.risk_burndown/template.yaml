id: planning.risk_burndown
version: 1.0.0
category: planning
title: Risk Burndown
description: Tracks risk reduction over time with mitigations, owners, review dates, and residual exposure.
input_schema: schema.input.json
input_schema_kind: timeline_v1
renderer:
  contract: offline.timeline.v1
layout:
  preset: line
  group_by: group
effects:
  engine: three.v1
  scene: planning_risk_burndown
  camera: dolly_tunnel
  particles: event_stream
  material: risk_prism
  motion: timeline_replay
  interaction:
    - orbit_drag
    - raycast_inspect
    - replay_timeline
    - metric_depth_hover
  postprocess:
    - status_glitch
    - depth_fog
visual_design:
  initial_view: overview
  max_initial_nodes: 24
  default_collapse_depth: 1
  group_by:
    - phase
    - kind
    - status
  supports:
    - phase_collapse
    - search
    - focus_event
    - export_json
  agent_guidance:
    - Group long timelines into phases.
    - Show milestones first and keep routine events as collapsed detail.
    - Use status and kind to help filtering.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/planning.risk_burndown/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/planning.risk_burndown/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - burndown
  - line
  - planning
  - risk
  - timeline
