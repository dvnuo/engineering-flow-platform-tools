id: knowledge.graph
version: 1.0.0
category: knowledge
title: Graph
description: Connects concepts, facts, owners, references, and unresolved gaps in a knowledge graph.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: knowledge_graph
  group_by: group
effects:
  engine: three.v1
  scene: knowledge_graph
  camera: orbit_isometric
  particles: evidence_beams
  material: emissive_network
  motion: slow_orbit
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
  postprocess:
    - emissive_glow
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/knowledge.graph/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/knowledge.graph/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - graph
  - knowledge
  - knowledge_graph
