id: debug.blast_radius_sphere
version: 1.0.0
category: debug
title: Blast Radius Sphere
description: Estimates impacted users, services, data paths, and rollback scope around a failure.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: radial_tree
  group_by: group
effects:
  engine: three.v1
  scene: debug_blast_radius_sphere
  camera: orbit_perspective
  particles: ambient_stars
  material: holographic_rings
  motion: orbital_scan
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
  postprocess:
    - emissive_glow
    - status_glitch
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/debug.blast_radius_sphere/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/debug.blast_radius_sphere/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - blast
  - debug
  - graph
  - radial_tree
  - radius
  - sphere
