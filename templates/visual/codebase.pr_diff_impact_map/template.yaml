id: codebase.pr_diff_impact_map
version: 1.0.0
category: codebase
title: PR Diff Impact Map
description: Shows how pull request changes touch modules, tests, contracts, reviewers, and release risk.
input_schema: schema.input.json
input_schema_kind: graph_events_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: ripple
  group_by: group
effects:
  engine: three.v1
  scene: codebase_pr_diff_impact_map
  camera: orbit_isometric
  particles: event_stream
  material: emissive_network
  motion: timeline_replay
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
    - replay_timeline
  postprocess:
    - emissive_glow
    - depth_fog
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/codebase.pr_diff_impact_map/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/codebase.pr_diff_impact_map/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - codebase
  - diff
  - graph_events
  - impact
  - map
  - pr
  - ripple
