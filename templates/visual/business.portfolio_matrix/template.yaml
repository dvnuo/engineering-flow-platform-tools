id: business.portfolio_matrix
version: 1.0.0
category: business
title: Portfolio Matrix
description: Compares initiatives by value, cost, risk, strategic fit, and current investment state.
input_schema: schema.input.json
input_schema_kind: matrix_v1
renderer:
  contract: offline.matrix.v1
layout:
  preset: matrix_board
  group_by: group
effects:
  engine: three.v1
  scene: business_portfolio_matrix
  camera: isometric_dashboard
  particles: kpi_signal_dust
  material: dashboard_glass
  motion: flow_chase
  interaction:
    - orbit_drag
    - raycast_inspect
    - metric_depth_hover
  postprocess:
    - emissive_glow
    - depth_fog
    - soft_reflection
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/business.portfolio_matrix/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/business.portfolio_matrix/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - business
  - matrix
  - matrix_board
  - portfolio
