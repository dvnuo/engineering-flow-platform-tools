id: studio.service_topology
version: 1.0.0
category: studio
title: Service Topology Studio
description: Presents services, clouds, queues, databases, and operational panels as an explorable topology page.
input_schema: schema.input.json
input_schema_kind: studio_v1
renderer:
  contract: offline.studio.v1
layout:
  preset: studio_topology
  group_by: domain
effects:
  engine: three.v1
  scene: studio_service_topology
  camera: orbit_isometric
  particles: semantic_depth_dust
  material: holographic
  motion: slow_orbit
  interaction:
    - click_inspect
    - focus_path
    - filter_panels
  postprocess:
    - emissive_glow
visual_design:
  initial_view: overview
  max_initial_nodes: 56
  max_initial_edges: 112
  default_collapse_depth: 1
  group_by:
    - domain
    - provider
    - kind
    - status
  supports:
    - studio_panels
    - hero_visual
    - navigation
    - inspector
    - controls
    - assumptions
    - annotations
  agent_guidance:
    - Use this template when service topology needs explanatory panels and operational controls.
    - Keep hero.data focused on runtime services and the most important dependencies.
    - Put ownership, SLO, evidence, and failure modes in panels.
    - Add controls for domain, provider, risk, and critical path focus.
    - Read panel-grammar before writing panels.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/studio.service_topology/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/studio.service_topology/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - panel_navigation
  - filter_by_type
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - studio
  - service
  - topology
  - operations
  - page
