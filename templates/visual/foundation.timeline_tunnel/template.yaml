id: foundation.timeline_tunnel
version: 1.0.0
category: foundation
title: Timeline Tunnel
description: Shows release milestones moving through an ordered tunnel of decisions, risks, rehearsal, and final signoff.
input_schema: schema.input.json
input_schema_kind: timeline_v1
renderer:
  contract: offline.timeline.v1
layout:
  preset: timeline_tunnel
  group_by: group
effects:
  engine: three.v1
  scene: foundation_timeline_tunnel
  camera: dolly_tunnel
  particles: event_stream
  material: matte_depth
  motion: timeline_replay
  interaction:
    - orbit_drag
    - raycast_inspect
    - replay_timeline
  postprocess:
    - depth_fog
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/foundation.timeline_tunnel/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/foundation.timeline_tunnel/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - foundation
  - timeline
  - timeline_tunnel
  - tunnel
