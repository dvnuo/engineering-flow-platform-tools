id: education.state_transition_tutorial
version: 1.0.0
category: education
title: State Transition Tutorial
description: Teaches states, events, guards, allowed transitions, and terminal outcomes with examples.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: state_machine
  group_by: group
effects:
  engine: three.v1
  scene: education_state_transition_tutorial
  camera: orbit_isometric
  particles: teaching_path_markers
  material: emissive_network
  motion: slow_orbit
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
    - step_scrub
  postprocess:
    - emissive_glow
visual_design:
  initial_view: overview
  max_initial_nodes: 60
  max_initial_edges: 120
  default_collapse_depth: 1
  group_by:
    - group
    - kind
    - status
  supports:
    - expand_collapse
    - edge_type_filter
    - focus_path
    - search
    - isolate_node
    - label_lod
    - export_json
    - group_by_module
    - hide_detail_edges
  agent_guidance:
    - Do not emit every detail as an initially visible node.
    - Group related nodes and mark low-importance detail nodes visible=false.
    - Use importance to decide the initial overview.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/education.state_transition_tutorial/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/education.state_transition_tutorial/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - education
  - graph
  - state
  - state_machine
  - transition
  - tutorial
