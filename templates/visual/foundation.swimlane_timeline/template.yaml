id: foundation.swimlane_timeline
version: 1.0.0
category: foundation
title: Swimlane Timeline
description: Visualize Swimlane Timeline as a complete offline timeline view for foundation workflows using the swimlane_timeline layout.
input_schema: schema.input.json
input_schema_kind: timeline_v1
renderer:
  contract: offline.timeline.v1
layout:
  preset: swimlane_timeline
  group_by: group
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/foundation.swimlane_timeline/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/foundation.swimlane_timeline/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - foundation
  - swimlane
  - swimlane_timeline
  - timeline
