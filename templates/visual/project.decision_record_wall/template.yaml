id: project.decision_record_wall
version: 1.0.0
category: project
title: Decision Record Wall
description: Displays decision records with status, rationale, owners, supporting evidence, and superseded notes.
input_schema: schema.input.json
input_schema_kind: evidence_v1
renderer:
  contract: offline.evidence.v1
layout:
  preset: document_wall
  group_by: group
effects:
  engine: three.v1
  scene: project_decision_record_wall
  camera: wall_orbit
  particles: evidence_beams
  material: glass_panels
  motion: beam_trace
  interaction:
    - orbit_drag
    - raycast_inspect
    - filter_relation
  postprocess:
    - soft_reflection
visual_design:
  initial_view: overview
  max_initial_nodes: 40
  max_initial_edges: 80
  default_collapse_depth: 1
  group_by:
    - claim_status
    - source_kind
    - reliability
  supports:
    - filter_relation
    - collapse_sources
    - focus_claim
    - search
    - export_json
  agent_guidance:
    - Show decisive claims first and group sources by kind or reliability.
    - Use relation types supports/refutes/mentions for filtering.
    - Hide weak or duplicative evidence until a claim is focused.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/project.decision_record_wall/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/project.decision_record_wall/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - decision
  - document_wall
  - evidence
  - project
  - record
  - wall
