<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'none'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' blob: data:;">
  <title>{{ .Title }}</title>
  {{- range .Styles }}
  <link rel="stylesheet" href="{{ . }}">
  {{- end }}
</head>
<body>
  <noscript>This offline visual artifact requires local JavaScript to render the embedded data.</noscript>
  <div id="visual-root" class="visual-root"></div>
  {{- if .ThreeModule }}
  <script>
    window.EFPVisualThreePending = true;
  </script>
  <script type="module" src="{{ .ThreeModuleScript }}"></script>
  {{- end }}
  {{- range .Scripts }}
  <script src="{{ . }}"></script>
  {{- end }}
  <script>
    (function () {
      var started = false;
      function start() {
        if (started) {
          return;
        }
        started = true;
        window.EFPVisualRuntime.boot();
      }
      if (window.EFPVisualThreePending) {
        window.addEventListener("efp:three-ready", start, { once: true });
        window.setTimeout(start, 1200);
      } else {
        start();
      }
    }());
  </script>
</body>
</html>
