id: codebase.bug_localization_map
version: 1.0.0
category: codebase
title: Bug Localization Map
description: Connects symptoms, logs, failing tests, touched modules, and likely fix targets for a bug.
input_schema: schema.input.json
input_schema_kind: graph_events_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: heatmap
  group_by: group
effects:
  engine: three.v1
  scene: codebase_bug_localization_map
  camera: isometric_terrain
  particles: event_stream
  material: heightfield_surface
  motion: timeline_replay
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
    - replay_timeline
    - metric_depth_hover
  postprocess:
    - depth_fog
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/codebase.bug_localization_map/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/codebase.bug_localization_map/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - bug
  - codebase
  - graph_events
  - heatmap
  - localization
  - map
