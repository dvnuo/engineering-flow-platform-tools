id: agent.run_replay_timeline
version: 1.0.0
category: agent
title: Run Replay Timeline
description: Visualize Run Replay Timeline as a complete offline graph_events view for agent workflows using the replay_stage layout.
input_schema: schema.input.json
input_schema_kind: graph_events_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: replay_stage
  group_by: group
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/agent.run_replay_timeline/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/agent.run_replay_timeline/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - agent
  - graph_events
  - replay
  - replay_stage
  - run
  - timeline
