id: business.customer_segment_constellation
version: 1.0.0
category: business
title: Customer Segment Constellation
description: Clusters customer segments by needs, revenue, adoption, support load, and opportunity.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: constellation
  group_by: group
effects:
  engine: three.v1
  scene: business_customer_segment_constellation
  camera: orbit_perspective
  particles: kpi_signal_dust
  material: dashboard_glass
  motion: flow_chase
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
  postprocess:
    - emissive_glow
    - depth_fog
    - soft_reflection
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/business.customer_segment_constellation/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/business.customer_segment_constellation/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - business
  - constellation
  - customer
  - graph
  - segment
