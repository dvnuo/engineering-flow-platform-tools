id: architecture.isometric_overview
version: 1.0.0
category: architecture
title: Isometric Architecture Overview
description: Maps zones, systems, services, infrastructure, and directional links onto an isometric architecture scene.
input_schema: schema.input.json
input_schema_kind: isometric_architecture_v1
renderer:
  contract: offline.architecture.isometric.v1
layout:
  preset: isometric_architecture
  group_by: zone
effects:
  engine: three.v1
  scene: isometric_architecture
  camera: orthographic_isometric
  particles: none
  material: architecture_light
  motion: constrained_orbit
  interaction:
    - constrained_orbit
    - click_inspect
    - isolate_zone
    - toggle_labels
    - export_json
visual_design:
  initial_view: overview
  max_initial_nodes: 120
  max_initial_edges: 240
  default_collapse_depth: 0
  group_by:
    - zone
    - kind
    - platform
  supports:
    - base_plane
    - isometric_grid
    - zones
    - typed_entities
    - directional_links
    - top_labels
    - leader_lines
    - billboard_labels
    - constrained_camera
    - local_icons
    - local_model_badges
  agent_guidance:
    - Use explicit zones with numeric bounds and typed entities with positions.
    - Use local presentation.icon and presentation.model IDs for recognizable infrastructure badges.
    - Use directional links with short labels, arrow presentation, and explicit routes for dense diagrams.
    - Keep the theme architecture_light and avoid Studio panels, starfields, dust, or holographic effects.
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: ../_shared/mark-registry.json
    to: assets/mark-registry.json
  - from: ../_shared/asset-registry.json
    to: assets/asset-registry.json
  - from: ../_shared/assets/icons/generic/service.svg
    to: assets/icons/generic/service.svg
  - from: ../_shared/assets/icons/generic/api.svg
    to: assets/icons/generic/api.svg
  - from: ../_shared/assets/icons/generic/database.svg
    to: assets/icons/generic/database.svg
  - from: ../_shared/assets/icons/generic/storage.svg
    to: assets/icons/generic/storage.svg
  - from: ../_shared/assets/icons/generic/queue.svg
    to: assets/icons/generic/queue.svg
  - from: ../_shared/assets/icons/generic/user.svg
    to: assets/icons/generic/user.svg
  - from: ../_shared/assets/icons/generic/external.svg
    to: assets/icons/generic/external.svg
  - from: style.css
    to: assets/templates/architecture.isometric_overview/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/architecture.isometric_overview/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - click_inspect
  - constrained_orbit
  - focus_selected
  - isolate_zone
  - hide_others
  - show_all
  - toggle_labels
  - toggle_boundaries
  - toggle_arrows
  - export_json
limits:
  max_nodes: 1500
  max_edges: 4000
  max_events: 0
  max_items: 2000
tags:
  - architecture
  - isometric
  - service-map
  - infrastructure
  - topology
