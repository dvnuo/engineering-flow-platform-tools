id: planning.checklist_progress_orbit
version: 1.0.0
category: planning
title: Checklist Progress Orbit
description: Shows checklist items orbiting a goal by owner, completion state, and blocking dependency.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: orbit_system
  group_by: group
effects:
  engine: three.v1
  scene: planning_checklist_progress_orbit
  camera: orbit_perspective
  particles: ambient_stars
  material: holographic_rings
  motion: orbital_scan
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
  postprocess:
    - emissive_glow
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/planning.checklist_progress_orbit/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/planning.checklist_progress_orbit/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - checklist
  - graph
  - orbit
  - orbit_system
  - planning
  - progress
