id: education.memory_layout_view
version: 1.0.0
category: education
title: Memory Layout View
description: Shows stack, heap, static data, pointers, allocation lifetime, and ownership boundaries.
input_schema: schema.input.json
input_schema_kind: graph_v1
renderer:
  contract: offline.graph.v1
layout:
  preset: layered_stack
  group_by: group
effects:
  engine: three.v1
  scene: education_memory_layout_view
  camera: orbit_isometric
  particles: teaching_path_markers
  material: emissive_network
  motion: slow_orbit
  interaction:
    - orbit_drag
    - raycast_inspect
    - focus_path
    - step_scrub
  postprocess:
    - emissive_glow
offline:
  required: true
  forbid_network: true
  data_mode: js-file
assets:
  - from: ../_shared/runtime/efp-visual-runtime.iife.js
    to: assets/runtime/efp-visual-runtime.iife.js
  - from: ../_shared/runtime/efp-visual-renderers.iife.js
    to: assets/runtime/efp-visual-renderers.iife.js
  - from: ../_shared/runtime/efp-visual-runtime.css
    to: assets/runtime/efp-visual-runtime.css
  - from: style.css
    to: assets/templates/education.memory_layout_view/style.css
styles:
  - assets/runtime/efp-visual-runtime.css
  - assets/templates/education.memory_layout_view/style.css
scripts:
  - manifest.js
  - data.js
  - assets/runtime/efp-visual-runtime.iife.js
  - assets/runtime/efp-visual-renderers.iife.js
interactions:
  - hover_tooltip
  - click_inspect
  - search_node
  - filter_by_type
  - filter_by_status
  - focus_path
  - export_json
limits:
  max_nodes: 1000
  max_edges: 3000
  max_events: 5000
  max_items: 2000
tags:
  - education
  - graph
  - layered_stack
  - layout
  - memory
  - view
